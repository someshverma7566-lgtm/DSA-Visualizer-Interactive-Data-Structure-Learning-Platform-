<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Graph Traversal</title>

<link rel="stylesheet" href="css/style.css">

<script defer src="js/app.js"></script>
<script defer src="js/graph.js"></script>

</head>

<body>

<script>
document.body.insertAdjacentHTML("afterbegin", getSidebarHTML());
</script>

<main class="main-content">

<div class="page-header">
<div>
<h1>Graph Traversal</h1>
<p>BFS / DFS Visualization</p>
</div>
<button class="theme-toggle">☀️</button>
</div>

<div class="glass-card">

<input id="nodeCount" placeholder="Number of nodes">

<textarea id="edgeInput" placeholder="Edges (u v)
0 1
1 2
2 3"></textarea>

<select id="algorithm">
<option value="bfs">BFS</option>
<option value="dfs">DFS</option>
</select>

<input id="startNode" placeholder="Start node">

<br>

<label>Speed</label>
<input type="range" id="speedSlider" min="100" max="1500" value="600">

<br><br>

<button onclick="buildGraph()">Build</button>
<button id="runBtn" onclick="runTraversal()">Run</button>

</div>

<div class="glass-card">
<canvas id="graphCanvas" height="400"></canvas>
</div>

<div class="glass-card">
<h3>Adjacency List</h3>
<div id="adjListDisplay"></div>
</div>

<div class="glass-card">
<h3>Traversal Order</h3>
<div id="traversalOrder"></div>
</div>

<div class="glass-card">
<div id="stepLog"></div>
</div>

</main>

</body>
</html>
